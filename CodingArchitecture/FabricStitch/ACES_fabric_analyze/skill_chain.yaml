# ═══════════════════════════════════════════════════════════════════════════════
# skill_chain.yaml — ACES Skill Chain Definition
# FQSN: CodingArchitecture/FabricStitch/ACES_fabric_analyze
# VERSION: 4.0.0
#
# Three-phase sequential pipeline — promise → delivery → gap
# Each phase completes before the next starts ($AND barrier per phase).
# Three agents total (reduced from 7).
# Only synthesis uses Anthropic — all extraction uses Ollama cloud ($0.00).
#
# Phase 1: Extract promises from 2022 article  → qwen3.5:397b-cloud
# Phase 2: Extract delivery from current repo  → qwen3-next:80b-cloud
# Phase 3: Gap analysis (promise vs delivery)  → qwen3.5:397b-cloud
# Synthesis: Analytical brief                  → claude-opus-4-5 (Anthropic)
# ═══════════════════════════════════════════════════════════════════════════════

title:   "UOR Framework — Promise vs Delivery Gap Analysis"
source:  "https://github.com/QCadjunct/UOR-Framework"
vendor:  "Ollama"
model:   "qwen3.5:397b-cloud"
outdir:  "~/fabric-analysis/uor-framework"
obsidian: ""
skip_docx: false

# ── PHASED SEQUENTIAL PIPELINE ───────────────────────────────────────────────
# depends_on: [] means start immediately
# depends_on: [1] means wait for Phase 1 $AND barrier to release
# depends_on: [1, 2] means wait for both Phase 1 AND Phase 2

phases:

  - phase: 1
    label: "PROMISE — what was claimed (2022-07-13)"
    depends_on: []
    agents:
      - pattern: extract_article_wisdom
        label:   "Extract all claims, goals, promises from 2022 article"
        vendor:  "Ollama"
        model:   "qwen3.5:397b-cloud"
        source:  "https://next.redhat.com/2022/07/13/the-uor-framework/"
        retry:   2
        timeout: 600
        enabled: true

  - phase: 2
    label: "DELIVERY — what exists today (2026-04-06)"
    depends_on: [1]
    agents:
      - pattern: extract_wisdom
        label:   "Extract current state, implementations, evidence from repo"
        vendor:  "Ollama"
        model:   "qwen3-next:80b-cloud"
        source:  "https://github.com/QCadjunct/UOR-Framework"
        retry:   2
        timeout: 600
        enabled: true

  - phase: 3
    label: "GAP — promise vs delivery · 1,362 days elapsed"
    depends_on: [1, 2]
    agents:
      - pattern: ACES_gap_analysis
        label:   "Allen Interval gap analysis — DELIVERED/PARTIAL/FAILED per claim"
        vendor:  "Ollama"
        model:   "qwen3.5:397b-cloud"
        source:  ""
        retry:   2
        timeout: 600
        enabled: true

# ── SYNTHESIS ─────────────────────────────────────────────────────────────────
synthesis:
  pattern:        "synthesize_analysis_brief_from_wisdom"
  vendor:         "Anthropic"
  model:          "claude-opus-4-5"
  word_minimum:   5000
  word_target:    6500
  word_limit:     8000
  document_limit: 15000
  directive:      ""
